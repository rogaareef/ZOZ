[[headers]]
  for="/*"
  [headers.values]
    X-Frame-Options="SAMEORIGIN"
    X-Content-Type-Options="nosniff"
    Referrer-Policy="strict-origin-when-cross-origin"
    Permissions-Policy="camera=(), microphone=(), geolocation=()"
    Content-Security-Policy="default-src 'self'; script-src 'self' 'unsafe-inline' https://pagead2.googlesyndication.com https://www.googletagmanager.com https://fonts.googleapis.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self' https://*.googleapis.com; frame-src https://googleads.g.doubleclick.net https://tpc.googlesyndication.com;"

[[headers]]
  for="/style.css"
  [headers.values]
    Cache-Control="public,max-age=604800,stale-while-revalidate=86400"

[[headers]]
  for="/app.js"
  [headers.values]
    Cache-Control="public,max-age=86400"

[[redirects]]
  from="/*"
  to="/404.html"
  status=404
